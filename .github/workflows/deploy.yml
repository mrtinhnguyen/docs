name: Deploy Mintlify to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/sotaydantoctongiao

            echo "📥 Pull code mới"
            git fetch --all
            git reset --hard origin/main

            echo "♻️ Restart service"
            systemctl restart mintlify

            echo "✅ Done"